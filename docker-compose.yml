services:
  api:
    build:
      context: .
      dockerfile: src/Qwiik.Api/Dockerfile
    container_name: qwiik-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=QwiikInvoicing;User Id=sa;Password=admin123@;TrustServerCertificate=True;MultipleActiveResultSets=true
    ports:
      - "5156:8080"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qwiik-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: admin123@
    ports:
      - "1433:1433"
    volumes:
      - qwiik-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  qwiik-sqlserver-data:
