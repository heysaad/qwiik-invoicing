name: Build

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build:
    name: Build API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Qwiik.slnx

      - name: Build
        run: dotnet build Qwiik.slnx --configuration Release --no-restore

  publish:
    name: Publish API Artifact
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish API
        run: dotnet publish src/Qwiik.Api/Qwiik.Api.csproj --configuration Release --output ./artifacts/api

      - name: Archive API artifact
        run: zip -r ./artifacts/qwiik-api.zip ./artifacts/api

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwiik-api
          path: ./artifacts/qwiik-api.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: qwiik-api
          path: ./release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/qwiik-api.zip
